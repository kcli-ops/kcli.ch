---
layout: main
---
<article class="post-content">
    <header class="post-header">
        <a href="{site.url("/")}" class="back-link">&larr; Zurück zu News</a>
        <h1 class="post-title">{page.title}</h1>
        {#if page.date}
          <time class="post-date" datetime="{page.date}">{page.date.format('dd.MM.yyyy')}</time>
        {/if}
    </header>
    <div class="post-body">
        {#insert /}
    </div>
</article>
