---
layout: main
---
<article class="page-content">
    <h1 class="page-title">{page.title}</h1>
    {#insert /}
    
    <div class="post-list">
        {#for post in site.collections.posts}
        <a href="{post.url}" class="post-card">
            {#if post.data.image}
            <div class="post-card-image">
                <img src="{site.url(post.data.image)}" alt="{post.title}">
            </div>
            {/if}
            <div class="post-card-content">
                <h3>{post.title}</h3>
                <time datetime="{post.date}">{post.date.format('dd.MM.yyyy')}</time>
            </div>
        </a>
        {/for}
    </div>
</article>
